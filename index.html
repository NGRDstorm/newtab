<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouvel onglet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d0d0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8e8ea;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { background: linear-gradient(135deg, #0d0d0f 0%, #111827 40%, #0a0a12 100%); }
    33%  { background: linear-gradient(135deg, #0a0f1a 0%, #0d1520 40%, #0d0d0f 100%); }
    66%  { background: linear-gradient(135deg, #0f0d1a 0%, #13101e 40%, #0a0f14 100%); }
    100% { background: linear-gradient(135deg, #0a0f1a 0%, #0f1a22 40%, #0d0d0f 100%); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    z-index: 0;
    animation: orbFloat 16s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: #3b5bdb; top: -100px; left: -100px; animation-duration: 14s; }
  .orb2 { width: 400px; height: 400px; background: #6741d9; bottom: -80px; right: -80px; animation-duration: 18s; animation-direction: alternate-reverse; }
  .orb3 { width: 300px; height: 300px; background: #1971c2; top: 40%; left: 60%; animation-duration: 20s; }

  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(30px, -20px) scale(1.05); }
    100% { transform: translate(-20px, 30px) scale(0.97); }
  }

  /* LAYOUT */
  .page {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 2.5rem;
    width: 100%;
    max-width: 1200px;
    padding: 2rem;
    height: 100vh;
  }

  /* LEFT — clock + search + weather */
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    flex: 1;
  }

  .clock-block { text-align: center; }

  #clock {
    font-size: clamp(3.5rem, 8vw, 6.5rem);
    font-weight: 200;
    letter-spacing: -2px;
    color: #f0f0f2;
    line-height: 1;
  }

  #date {
    margin-top: 0.4rem;
    font-size: 0.95rem;
    color: rgba(220,220,230,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .search-bar {
    width: 100%;
    max-width: 460px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 0.85rem 1.2rem 0.85rem 3rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: #e8e8ea;
    font-size: 1rem;
    outline: none;
    backdrop-filter: blur(12px);
    transition: border-color 0.2s, background 0.2s;
  }
  .search-bar input::placeholder { color: rgba(200,200,210,0.35); }
  .search-bar input:focus {
    border-color: rgba(100,130,255,0.5);
    background: rgba(255,255,255,0.09);
  }
  .search-bar svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  .weather-block {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 0.9rem 1.4rem;
    backdrop-filter: blur(10px);
    min-width: 200px;
    justify-content: center;
  }
  .weather-icon { font-size: 2rem; line-height: 1; }
  .weather-info { display: flex; flex-direction: column; gap: 2px; }
  .weather-temp { font-size: 1.5rem; font-weight: 300; color: #f0f0f2; }
  .weather-desc { font-size: 0.75rem; color: rgba(200,200,210,0.5); text-transform: uppercase; letter-spacing: 0.06em; }
  .weather-city { font-size: 0.7rem; color: rgba(200,200,210,0.35); }
  .weather-loading { color: rgba(200,200,210,0.4); font-size: 0.85rem; }

  /* DIVIDER */
  .divider {
    width: 1px;
    height: 70vh;
    background: rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  /* RIGHT — news */
  .news-panel {
    width: 720px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    height: 80vh;
  }
 
  .news-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .news-header-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4c6ef5;
    box-shadow: 0 0 8px #4c6ef5;
  }
  .news-header span {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(200,200,220,0.45);
    font-weight: 500;
  }
 
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
 
  .news-item {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    border-radius: 8px;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
  }
  .news-item:hover { background: rgba(255,255,255,0.04); }
 
  .news-source {
    font-size: 0.65rem;
    color: #4c6ef5;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
 
  .news-title {
    font-size: 0.82rem;
    color: rgba(230,230,240,0.85);
    line-height: 1.4;
    font-weight: 400;
  }
 
  .news-time {
    font-size: 0.65rem;
    color: rgba(200,200,210,0.3);
  }
 
  .news-loading {
    color: rgba(200,200,210,0.35);
    font-size: 0.82rem;
    text-align: center;
    margin-top: 2rem;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="clock-block">
      <div id="clock">00:00</div>
      <div id="date">chargement...</div>
    </div>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Rechercher sur le web..." id="searchInput" autofocus>
    </div>

    <div class="weather-block" id="weatherBlock">
      <span class="weather-loading">Chargement météo…</span>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- RIGHT — NEWS -->
  <div class="news-panel">
    <div class="news-header">
      <div class="news-header-dot"></div>
      <span>Tech &amp; Gaming</span>
    </div>
    <div class="news-list" id="newsList">
      <div class="news-loading">Chargement des news…</div>
    </div>
  </div>

</div>

<script>
/* CLOCK */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  const day = days[now.getDay()];
  document.getElementById('date').textContent = day + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

/* SEARCH */
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = this.value.trim();
    if (!q) return;
    window.location.href = q.startsWith('http') ? q : 'https://search.brave.com/search?q=' + encodeURIComponent(q);
  }
});

/* WEATHER */
async function fetchWeather() {
  try {
    const res = await fetch('https://wttr.in/?format=j1');
    const data = await res.json();
    const current = data.current_condition[0];
    const temp = current.temp_C;
    const desc = current.lang_fr?.[0]?.value || current.weatherDesc[0].value;
    const city = data.nearest_area[0].areaName[0].value;
    const code = parseInt(current.weatherCode);
    let icon = '🌤️';
    if (code === 113) icon = '☀️';
    else if (code === 116) icon = '⛅';
    else if (code === 119 || code === 122) icon = '☁️';
    else if ([143,248,260].includes(code)) icon = '🌫️';
    else if ([176,263,266,293,296,353].includes(code)) icon = '🌦️';
    else if ([299,302,305,308,356,359].includes(code)) icon = '🌧️';
    else if ([179,182,185,281,284,311,314,317,320,323,326,329,332,335,338,350,368,371,374,377].includes(code)) icon = '❄️';
    else if ([386,389,392,395].includes(code)) icon = '⛈️';
    document.getElementById('weatherBlock').innerHTML =
      '<span class="weather-icon">' + icon + '</span>' +
      '<div class="weather-info">' +
        '<span class="weather-temp">' + temp + '°C</span>' +
        '<span class="weather-desc">' + desc + '</span>' +
        '<span class="weather-city">' + city + '</span>' +
      '</div>';
  } catch(e) {
    document.getElementById('weatherBlock').innerHTML = '<span class="weather-loading">Météo indisponible</span>';
  }
}
fetchWeather();

/* NEWS via GNews API */
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return 'il y a ' + Math.floor(diff/60) + ' min';
  if (diff < 86400) return 'il y a ' + Math.floor(diff/3600) + 'h';
  return 'il y a ' + Math.floor(diff/86400) + 'j';
}

async function fetchNews() {
  const list = document.getElementById('newsList');
  try {
    const key = 'pub_7d7e51b4f3774706ad1a39390ff2bc6b';
    const url = 'https://newsdata.io/api/1/news?apikey=' + key + '&q=tech gaming&language=fr&size=8';
    const res = await fetch(url);
    const data = await res.json();

    if (!data.results || !data.results.length) throw new Error('empty');

    list.innerHTML = data.results.map(a =>
      '<a class="news-item" href="' + (a.link || '#') + '" target="_blank">' +
        '<span class="news-source">' + (a.source_id || 'News') + '</span>' +
        '<span class="news-title">' + a.title + '</span>' +
        '<span class="news-time">' + timeAgo(a.pubDate) + '</span>' +
      '</a>'
    ).join('');
  } catch(e) {
    list.innerHTML = '<div class="news-loading">News indisponibles</div>';
  }
}
fetchNews();
</script>
</body>
</html>
